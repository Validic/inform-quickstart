name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-quickstart:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/quickstart
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/quickstart/package-lock.json
      - run: npm ci
      - run: npm test
